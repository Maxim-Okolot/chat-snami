<!-- Мини-игра: Кубик -->
<div id="dice-game-block" style="max-width:380px;margin:32px auto 0 auto;padding:20px 18px 18px 18px;background:#e7f0fd;border-radius:14px;box-shadow:0 2px 12px #2a7ae244;text-align:center;">
  <div style="font-size:1.2em;color:#2a7ae2;font-weight:bold;margin-bottom:12px;">Мини-игра: Кубик</div>
  <div style="color:#444;margin-bottom:10px;">Нажмите <b>Бросить кубик</b> и получите предсказание!</div>
  <div id="dice-area" style="height:120px;display:flex;justify-content:center;align-items:center;margin-bottom:18px;">
    <div id="dice" class="dice" style="display:none;"></div>
  </div>
  <button id="dice-roll-btn" style="background:linear-gradient(90deg,#2a7ae2 0%,#6ea8fe 100%);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:1.1em;cursor:pointer;box-shadow:0 2px 6px #2a7ae244;margin-bottom:10px;">Бросить кубик</button>
  <div id="dice-result" style="margin-top:18px;font-size:1.15em;color:#2a7ae2;min-height:32px;"></div>
</div>
<style>
.dice {
  width: 70px;
  height: 70px;
  position: relative;
  perspective: 300px;
  margin: 0 auto;
  transform-style: preserve-3d;
  transition: transform 1.2s cubic-bezier(.17,.67,.83,.67);
}
.dice-face {
  position: absolute;
  width: 70px;
  height: 70px;
  background: #fff;
  border: 2px solid #2a7ae2;
  border-radius: 12px;
  box-shadow: 0 2px 12px #2a7ae244;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  font-size: 2.2em;
}
.dice-dot {
  width: 14px;
  height: 14px;
  background: #2a7ae2;
  border-radius: 50%;
  margin: 7px;
  display: inline-block;
}
.dice-face1 { transform: rotateY(0deg) translateZ(35px);}
.dice-face2 { transform: rotateY(180deg) translateZ(35px);}
.dice-face3 { transform: rotateY(90deg) translateZ(35px);}
.dice-face4 { transform: rotateY(-90deg) translateZ(35px);}
.dice-face5 { transform: rotateX(90deg) translateZ(35px);}
.dice-face6 { transform: rotateX(-90deg) translateZ(35px);}
@media (max-width:600px){
  #dice-game-block{padding:10px 2vw;}
  .dice, .dice-face{width:48px;height:48px;}
  .dice-dot{width:10px;height:10px;margin:4px;}
}
</style>
<script>
const diceMeanings = {
  1: "Ожидайте приятного сюрприза!",
  2: "Сегодня лучше не рисковать.",
  3: "Вас ждёт удача в любви.",
  4: "День для новых знакомств.",
  5: "Время для отдыха и релакса.",
  6: "Ваши мечты скоро сбудутся!"
};
function createDiceFace(num) {
  // Расположение точек на гранях
  const dotPos = [
    [],
    [4],
    [0,8],
    [0,4,8],
    [0,2,6,8],
    [0,2,4,6,8],
    [0,2,3,5,6,8]
  ];
  let faces = [];
  for(let i=1;i<=6;i++) {
    let face = document.createElement('div');
    face.className = 'dice-face dice-face'+i;
    for(let j=0;j<9;j++) {
      let dot = document.createElement('span');
      dot.style.width='22px';dot.style.height='22px';dot.style.display='inline-block';
      if(dotPos[i].includes(j)) {
        let d = document.createElement('span');
        d.className = 'dice-dot';
        dot.appendChild(d);
      }
      face.appendChild(dot);
    }
    faces.push(face);
  }
  return faces;
}
function getDiceRotation(num) {
  // Для 3D кубика: 1 - вперед, 2 - назад, 3 - вправо, 4 - влево, 5 - вверх, 6 - вниз
  switch(num) {
    case 1: return "rotateY(0deg)";
    case 2: return "rotateY(180deg)";
    case 3: return "rotateY(-90deg)";
    case 4: return "rotateY(90deg)";
    case 5: return "rotateX(-90deg)";
    case 6: return "rotateX(90deg)";
  }
}
function rollDiceAnimation(num) {
  const dice = document.getElementById('dice');
  dice.innerHTML = '';
  createDiceFace(num).forEach(face=>dice.appendChild(face));
  dice.style.display = '';
  // Анимация: случайные вращения, потом итоговое
  let randomTurns = [
    "rotateX(360deg) rotateY(360deg)",
    "rotateX(720deg) rotateY(720deg)",
    "rotateX(1080deg) rotateY(1080deg)"
  ];
  dice.style.transform = randomTurns[Math.floor(Math.random()*3)];
  setTimeout(()=>{
    dice.style.transition = "transform 1.2s cubic-bezier(.17,.67,.83,.67)";
    dice.style.transform = getDiceRotation(num) + " rotateZ(0deg)";
  },100);
}
document.getElementById('dice-roll-btn').onclick = function() {
  document.getElementById('dice-result').innerHTML = "";
  let num = Math.floor(Math.random()*6)+1;
  rollDiceAnimation(num);
  setTimeout(()=>{
    document.getElementById('dice-result').innerHTML = `<b>Выпало: ${num}</b><br>${diceMeanings[num]}`;
  },1400);
};
</script>
